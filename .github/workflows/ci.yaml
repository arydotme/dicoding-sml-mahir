name: workflow-ci

on:
  push:
    branches: [ main ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install mlflow
          pip install -r Membangun_model/requirements.txt

      - name: Run MLflow project
        run: |
          export MLFLOW_TRACKING_URI=file:./Workflow-CI/MLProject/mlruns
          mlflow run Workflow-CI/MLProject --env-manager local

      - name: Check mlruns folder
        run: |
          ls Workflow-CI/MLProject/mlruns